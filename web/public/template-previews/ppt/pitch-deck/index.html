<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>路演 Pitch · 预览样张</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "PingFang SC", "Helvetica Neue", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      .stage {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .slide {
        width: min(960px, 92vw);
        aspect-ratio: 16 / 9;
        border-radius: 16px;
        padding: 3rem 3.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: linear-gradient(135deg, #1e3a8a 0%, #312e81 55%, #0f172a 100%);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      .kicker {
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.72;
        margin-bottom: 1rem;
      }
      h1 { font-size: clamp(1.75rem, 4vw, 2.75rem); line-height: 1.15; }
      h2 { font-size: clamp(1.25rem, 2.5vw, 1.75rem); margin-bottom: 1rem; }
      p, li { font-size: clamp(0.95rem, 1.6vw, 1.125rem); line-height: 1.55; opacity: 0.92; }
      ul { margin-top: 1rem; padding-left: 1.25rem; }
      #page-badge {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        font-size: 12px;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <section class="slide">
        <div class="kicker">Pitch Deck · Demo</div>
        <h1>金联创 · 智能研究助手</h1>
        <p style="margin-top: 1.25rem">融资路演结构样张 · 10 页叙事中的封面页</p>
      </section>
      <section class="slide" hidden>
        <div class="kicker">Problem</div>
        <h2>研究产出慢、版式不统一</h2>
        <ul>
          <li>多源数据整理耗时</li>
          <li>路演材料反复排版</li>
          <li>缺乏可复用模板资产</li>
        </ul>
      </section>
      <section class="slide" hidden>
        <div class="kicker">Solution</div>
        <h2>对话 + Skill + 可预览模板</h2>
        <p>选定模板 → 翻页预览 → 一键开写，与会话内 Skill 下拉同步。</p>
      </section>
    </div>
    <div id="page-badge">1 / 3</div>
    <script src="/template-previews/ppt/_shared/deck-viewer.js"></script>
  </body>
</html>
