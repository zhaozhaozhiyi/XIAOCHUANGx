<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>专业蓝 · 预览样张</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: "PingFang SC", "Source Han Sans SC", sans-serif;
        background: #e8eef5; color: #0b1f3a;
      }
      .stage { width: 100vw; height: 100vh; display: grid; place-items: center; padding: 2rem; }
      .slide {
        width: min(960px, 92vw); aspect-ratio: 16/9; border-radius: 8px;
        padding: 2.5rem 3.25rem; background: #fff;
        border-top: 6px solid #1d4ed8;
        box-shadow: 0 16px 48px rgba(29, 78, 216, 0.12);
        display: flex; flex-direction: column; justify-content: center;
      }
      .org { font-size: 12px; letter-spacing: 0.12em; color: #1e40af; margin-bottom: 1rem; }
      h1 { font-size: 1.85rem; font-weight: 600; }
      h2 { font-size: 1.3rem; color: #1e3a8a; margin-bottom: 0.75rem; }
      p { line-height: 1.65; color: #334155; }
      #page-badge { position: fixed; right: 1rem; bottom: 1rem; font-size: 12px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="stage">
      <section class="slide">
        <div class="org">INSTITUTIONAL RESEARCH</div>
        <h1>原油市场周度观察</h1>
        <p style="margin-top:1rem">专业蓝调机构研报风格 · 封面样张</p>
      </section>
      <section class="slide" hidden>
        <h2>观点摘要</h2>
        <p>OPEC+ 产量政策偏稳，近月结构小幅走强；关注地缘溢价回落风险。</p>
      </section>
      <section class="slide" hidden>
        <h2>风险提示</h2>
        <p>本样张仅供版式预览，不构成投资意见。正式内容由 Agent 按 Skill 生成。</p>
      </section>
    </div>
    <div id="page-badge">1 / 3</div>
    <script src="/template-previews/ppt/_shared/deck-viewer.js"></script>
  </body>
</html>
