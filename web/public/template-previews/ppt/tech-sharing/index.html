<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>技术分享 · 预览样张</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        font-family: ui-monospace, "SF Mono", "PingFang SC", sans-serif;
        background: #18181b; color: #fafafa;
      }
      .stage { width: 100vw; height: 100vh; display: grid; place-items: center; padding: 2rem; }
      .slide {
        width: min(960px, 92vw); aspect-ratio: 16/9; border-radius: 14px;
        padding: 2.75rem 3rem; background: #27272a;
        border: 1px solid #3f3f46;
        display: flex; flex-direction: column; justify-content: center;
      }
      h1 { font-size: 2rem; color: #a5f3fc; font-family: inherit; }
      h2 { font-size: 1.4rem; margin-bottom: 0.75rem; color: #f4f4f5; }
      pre {
        margin-top: 1rem; padding: 1rem 1.25rem; background: #09090b;
        border-radius: 8px; font-size: 0.85rem; line-height: 1.5; color: #86efac;
      }
      #page-badge { position: fixed; right: 1rem; bottom: 1rem; font-size: 12px; opacity: 0.5; }
    </style>
  </head>
  <body>
    <div class="stage">
      <section class="slide">
        <h1>模板预览架构</h1>
        <p style="margin-top:1rem;opacity:0.85">技术分享版式 · 代码与结构并重</p>
      </section>
      <section class="slide" hidden>
        <h2>可插拔 PreviewKind</h2>
        <pre>html-deck | docx | markdown | images</pre>
      </section>
      <section class="slide" hidden>
        <h2>与会话 Skill 下拉同步</h2>
        <p style="opacity:0.9;line-height:1.6">卡片负责发现与样张翻页；Composer 下拉负责会话内切换。</p>
      </section>
    </div>
    <div id="page-badge">1 / 3</div>
    <script src="/template-previews/ppt/_shared/deck-viewer.js"></script>
  </body>
</html>
