openapi: 3.1.0
info:
  title: JLC Companion Runtime API
  version: 0.1.0-draft
  description: >
    Draft API for multi-agent CLI orchestration. This version separates run control,
    queue semantics, workspace handles, and waiting-user states from any single CLI.
servers:
  - url: http://127.0.0.1:9477
paths:
  /v1/agents/capabilities:
    get:
      summary: List agent capabilities
      responses:
        "200":
          description: Capability list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentCapability"
  /v1/runs:
    post:
      summary: Create a run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunRequestV2"
      responses:
        "200":
          description: SSE stream of run events
          content:
            text/event-stream:
              schema:
                type: string
  /v1/runs/{runId}:
    get:
      summary: Get run record
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunRecord"
  /v1/runs/{runId}/events:
    get:
      summary: Replay or attach to run event stream
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - in: query
          name: after
          required: false
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/runs/{runId}/cancel:
    post:
      summary: Cancel an active run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancel acknowledgement
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  runId:
                    type: string
  /v1/runs/{runId}/control:
    post:
      summary: Enqueue, interrupt, or steer a run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunControlRequest"
      responses:
        "200":
          description: Control accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                  runId:
                    type: string
  /v1/runs/{runId}/approval:
    post:
      summary: Respond to a pending approval
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalResponse"
      responses:
        "200":
          description: Approval response accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  runId:
                    type: string
  /v1/runs/{runId}/clarification:
    post:
      summary: Respond to a pending clarification
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClarificationResponse"
      responses:
        "200":
          description: Clarification response accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  runId:
                    type: string
  /v1/workspaces/{workspaceId}:
    get:
      summary: Get workspace handle
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace handle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceHandle"
components:
  schemas:
    AgentCapability:
      type: object
      required:
        - agentId
        - label
        - available
        - supportsStreaming
        - supportsToolProgress
        - supportsNarration
        - supportsResumeThread
        - supportsInterrupt
        - supportsSteer
        - supportsApprovalPause
        - supportsWorkspaceMounts
        - supportsBrowser
        - supportsTerminal
        - inputStyle
        - outputStyle
      properties:
        agentId:
          type: string
        label:
          type: string
        available:
          type: boolean
        supportsStreaming:
          type: boolean
        supportsToolProgress:
          type: boolean
        supportsNarration:
          type: boolean
        supportsResumeThread:
          type: boolean
        supportsInterrupt:
          type: boolean
        supportsSteer:
          type: boolean
        supportsApprovalPause:
          type: boolean
        supportsWorkspaceMounts:
          type: boolean
        supportsBrowser:
          type: boolean
        supportsTerminal:
          type: boolean
        inputStyle:
          type: string
          enum: [stdin, argv, jsonl]
        outputStyle:
          type: string
          enum: [plain, json, jsonl, sse-proxy]
    CreateRunRequestV2:
      type: object
      required:
        - tenantId
        - projectId
        - workspaceId
        - sessionId
        - turnId
        - agentId
        - agentModel
        - mode
        - queuePolicy
        - userMessage
      properties:
        tenantId:
          type: string
        projectId:
          type: string
        workspaceId:
          type: string
        sessionId:
          type: string
        turnId:
          type: string
        agentId:
          type: string
        agentModel:
          type: string
        mode:
          type: string
          enum: [fast, deep]
        queuePolicy:
          type: string
          enum: [enqueue, interrupt, steer, reject_if_busy]
        userMessage:
          type: object
          required: [text]
          properties:
            text:
              type: string
        context:
          type: object
          properties:
            processSkill:
              type: string
            platformNormSkill:
              type: string
    RunRecord:
      type: object
      required:
        - runId
        - tenantId
        - projectId
        - workspaceId
        - sessionId
        - turnId
        - agentId
        - agentModel
        - status
        - queuePolicy
        - createdAt
      properties:
        runId:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
        workspaceId:
          type: string
        sessionId:
          type: string
        turnId:
          type: string
        agentId:
          type: string
        agentModel:
          type: string
        status:
          type: string
          enum: [accepted, queued, starting, running, waiting_user, completed, failed, cancelled]
        queuePolicy:
          type: string
          enum: [enqueue, interrupt, steer, reject_if_busy]
        createdAt:
          type: string
          format: date-time
    RunControlRequest:
      type: object
      required: [action, text]
      properties:
        action:
          type: string
          enum: [enqueue, interrupt, steer]
        text:
          type: string
    ApprovalResponse:
      type: object
      required: [approvalId, decision]
      properties:
        approvalId:
          type: string
        decision:
          type: string
          enum: [approve, deny]
        note:
          type: string
    ClarificationResponse:
      type: object
      required: [clarificationId, text]
      properties:
        clarificationId:
          type: string
        text:
          type: string
        selectedOption:
          type: string
    WorkspaceHandle:
      type: object
      required:
        - workspaceId
        - tenantId
        - projectId
        - rootLabel
        - executionRoot
        - readableRoots
        - writableRoots
        - brokerMode
        - workspaceKind
      properties:
        workspaceId:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
        rootLabel:
          type: string
        executionRoot:
          type: string
        readableRoots:
          type: array
          items:
            type: string
        writableRoots:
          type: array
          items:
            type: string
        tempRoot:
          type: string
        brokerMode:
          type: string
          enum: [sandbox, git_worktree, container_mount]
        workspaceKind:
          type: string
          enum: [sandbox, local_bound, cloud]
