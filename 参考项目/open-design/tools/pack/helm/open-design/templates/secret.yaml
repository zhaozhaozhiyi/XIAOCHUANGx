{{- /*
  Open Design secret. Spec §15.7 — operators MUST set
  secrets.apiToken before exposing the daemon to a public network. The
  bound-API-token guard in startServer() refuses to bind a non-loopback
  interface without it.

  Provider keys (anthropicApiKey, tavilyApiKey) are optional; the
  daemon's UI / CLI configure path can fill them in at runtime.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-design.fullname" . }}-secrets
  labels:
    {{- include "open-design.labels" . | nindent 4 }}
type: Opaque
stringData:
  OD_API_TOKEN: {{ default "" .Values.secrets.apiToken | quote }}
  ANTHROPIC_API_KEY: {{ default "" .Values.secrets.anthropicApiKey | quote }}
  TAVILY_API_KEY: {{ default "" .Values.secrets.tavilyApiKey | quote }}
