  </text>
  <text x="1200" y="744" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="20" letter-spacing="4" fill="#6B6258" opacity="0.85">
